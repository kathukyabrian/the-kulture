databaseChangeLog:
  - changeSet:
      id: 001-create-core-tables
      author: codex
      changes:
        - createTable:
            tableName: routes
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: route_number
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: origin
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: destination
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createTable:
            tableName: vehicles
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: plate_number
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: route_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: occupancy_status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: verified
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: wifi_available
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: bass_level
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: screen_count
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: watcher_count
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: earnings_today
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: fleet_position
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: vehicles
            baseColumnNames: route_id
            referencedTableName: routes
            referencedColumnNames: id
            constraintName: fk_vehicles_route
        - createTable:
            tableName: crew_members
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicle_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: rating
                  type: numeric(2, 1)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: crew_members
            baseColumnNames: vehicle_id
            referencedTableName: vehicles
            referencedColumnNames: id
            constraintName: fk_crew_members_vehicle
        - createTable:
            tableName: vehicle_locations
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicle_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: numeric(10, 7)
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: numeric(10, 7)
                  constraints:
                    nullable: false
              - column:
                  name: speed_kph
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: recorded_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: vehicle_locations
            baseColumnNames: vehicle_id
            referencedTableName: vehicles
            referencedColumnNames: id
            constraintName: fk_vehicle_locations_vehicle
        - createTable:
            tableName: fleet_alerts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicle_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(60)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: varchar(300)
                  constraints:
                    nullable: false
              - column:
                  name: severity
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: resolved
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: fleet_alerts
            baseColumnNames: vehicle_id
            referencedTableName: vehicles
            referencedColumnNames: id
            constraintName: fk_fleet_alerts_vehicle

